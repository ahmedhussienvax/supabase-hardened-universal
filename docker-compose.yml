services:
  supabase-git-sync:
    image: alpine
    container_name: supabase-git-sync
    restart: "no"
    volumes:
      - '.:/target'
    command: >
      sh -c "
        echo 'Starting Universal Master Sync...' &&
        apk add --no-cache git openssh &&
        rm -rf /tmp/repo &&
        if git clone --depth 1 https://github.com/ahmedhussienvax/supabase-hardened-universal.git /tmp/repo; then
          echo 'Clone Successful' &&
          mkdir -p /target/volumes &&
          rm -rf /target/volumes/db/init.sh &&
          cp -rf /tmp/repo/volumes/* /target/volumes/ &&
          # Force refresh of api and studio folders to clear old directory-file collisions
          rm -rf /target/volumes/api && mkdir -p /target/volumes/api && cp -f /tmp/repo/volumes/api/kong.yml /target/volumes/api/kong.yml &&
          rm -rf /target/volumes/studio && mkdir -p /target/volumes/studio && cp -f /tmp/repo/volumes/studio/proxy.js /target/volumes/studio/proxy.js &&
          echo 'Sync Completed Successfully!'
        else
          echo 'Sync Failed' && exit 1
        fi
      "
    networks:
      - coolify

  supabase-edge-functions-init:
    image: alpine
    restart: 'no'
    volumes:
      - './volumes/functions:/volumes/functions'
    command:
      - sh
      - -c
      - |
        set -e
        echo "Initializing Edge Functions..."
        mkdir -p /volumes/functions/main /volumes/functions/hello
        if [ ! -f /volumes/functions/main/index.ts ] || [ ! -s /volumes/functions/main/index.ts ]; then
          echo 'import { serve } from "https://deno.land/std@0.131.0/http/server.ts"; serve((req) => new Response("Main Function Active"));' > /volumes/functions/main/index.ts
        fi
        if [ ! -f /volumes/functions/hello/index.ts ] || [ ! -s /volumes/functions/hello/index.ts ]; then
          echo 'import { serve } from "https://deno.land/std@0.131.0/http/server.ts"; serve((req) => new Response("Hello World"));' > /volumes/functions/hello/index.ts
        fi
        echo "Initialization Successful."
    networks:
      - coolify

  supabase-kong:
    image: 'kong:2.8.1'
    restart: unless-stopped
    entrypoint: 'bash -c ''eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'''
    depends_on:
      supabase-analytics:
        condition: service_started
    environment:
      - SERVICE_URL_SUPABASEKONG_8000
      - 'KONG_PORT_MAPS=443:8000'
      - 'JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/home/kong/kong.yml
      - 'KONG_DNS_ORDER=LAST,A,CNAME'
      - 'KONG_PLUGINS=request-transformer,cors,key-auth,acl,basic-auth,request-termination'
      - KONG_NGINX_PROXY_PROXY_BUFFER_SIZE=160k
      - 'KONG_NGINX_PROXY_PROXY_BUFFERS=64 160k'
      - 'KONG_TRUSTED_IPS=172.16.0.0/12, 10.0.0.0/8'
      - KONG_REAL_IP_HEADER=X-Forwarded-For
      - 'SUPABASE_ANON_KEY=${SERVICE_SUPABASEANON_KEY}'
      - 'SUPABASE_SERVICE_KEY=${SERVICE_SUPABASESERVICE_KEY}'
      - 'DASHBOARD_USERNAME=${SERVICE_USER_ADMIN}'
      - 'DASHBOARD_PASSWORD=${SERVICE_PASSWORD_ADMIN}'
      - 'KONG_STORAGE_CONNECT_TIMEOUT=${KONG_STORAGE_CONNECT_TIMEOUT:-60}'
      - 'KONG_STORAGE_WRITE_TIMEOUT=${KONG_STORAGE_WRITE_TIMEOUT:-3600}'
      - 'KONG_STORAGE_READ_TIMEOUT=${KONG_STORAGE_READ_TIMEOUT:-3600}'
      - 'KONG_STORAGE_REQUEST_BUFFERING=${KONG_STORAGE_REQUEST_BUFFERING:-false}'
      - 'KONG_STORAGE_RESPONSE_BUFFERING=${KONG_STORAGE_RESPONSE_BUFFERING:-false}'
    networks:
      coolify:
        aliases:
          - "supabase.${PROJECT_DOMAIN:-localhost}"
          - "dashboard.${PROJECT_DOMAIN:-localhost}"
    extra_hosts:
      - "supabase.${PROJECT_DOMAIN:-localhost}:host-gateway"
      - "dashboard.${PROJECT_DOMAIN:-localhost}:host-gateway"
    labels:
      - traefik.enable=true
      - 'traefik.http.routers.supabase-kong.rule=Host(`${SERVICE_FQDN_SUPABASEKONG:-supabase.${PROJECT_DOMAIN:-localhost}}`)'
      - traefik.http.routers.supabase-kong.entrypoints=https
      - traefik.http.routers.supabase-kong.tls.certresolver=letsencrypt
      - traefik.http.services.supabase-kong.loadbalancer.server.port=8000
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - type: bind
        source: ./volumes/api/kong.yml
        target: /home/kong/temp.yml

  # ── Studio Sidecar Proxy ────────────────────────────────────────────────────
  # Intercepts /api/platform/* and /api/v1/* requests that don't exist in
  # self-hosted, returning synthetic responses to prevent UI crashes.
  # Traefik points to THIS container (port 3001), not directly to Studio.
  studio-proxy:
    image: node:20-alpine
    container_name: studio-proxy
    restart: unless-stopped
    depends_on:
      supabase-studio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - 'STUDIO_DEFAULT_ORGANIZATION=${STUDIO_DEFAULT_ORGANIZATION:-Default Organization}'
      - 'STUDIO_DEFAULT_PROJECT=${STUDIO_DEFAULT_PROJECT:-Default Project}'
      - 'SUPABASE_ANON_KEY=${SERVICE_SUPABASEANON_KEY}'
      - 'SUPABASE_SERVICE_KEY=${SERVICE_SUPABASESERVICE_KEY}'
      - 'SUPABASE_PUBLIC_URL=${SERVICE_URL_SUPABASEKONG}'
      - STUDIO_INTERNAL_HOST=supabase-studio
      - STUDIO_INTERNAL_PORT=3000
    volumes:
      - type: bind
        source: ./volumes/studio
        target: /app/studio
        read_only: true
    command: node /app/studio/proxy.js
    labels:
      - traefik.enable=true
      - 'traefik.http.routers.supabase-studio.rule=Host(`${SERVICE_FQDN_SUPABASESTUDIO:-supabase-studio.${PROJECT_DOMAIN:-localhost}}`)'
      - traefik.http.routers.supabase-studio.entrypoints=https
      - traefik.http.routers.supabase-studio.tls.certresolver=letsencrypt
      - traefik.http.services.supabase-studio.loadbalancer.server.port=3001
      - traefik.docker.network=coolify
    networks:
      - coolify

  supabase-studio:
    container_name: supabase-studio
    restart: unless-stopped
    image: 'supabase/studio:2026.03.30-sha-12a43e5'
    working_dir: /app/apps/studio
    command: ["node", "server.js"]
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - "require('http').get('http://127.0.0.1:3000/api/platform/profile', (r) => {process.exit(r.statusCode < 500 ? 0 : 1)}).on('error', () => process.exit(1))"
      timeout: 10s
      interval: 15s
      retries: 5
      start_period: 90s
    depends_on:
      supabase-analytics:
        condition: service_started
      supabase-db:
        condition: service_healthy
      supabase-kong:
        condition: service_started
      supabase-meta:
        condition: service_started
    environment:
      - HOSTNAME=0.0.0.0
      - 'STUDIO_PG_META_URL=http://supabase-meta:8080'
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - 'POSTGRES_HOST=${POSTGRES_HOSTNAME:-supabase-db}'
      - CURRENT_CLI_VERSION=2.67.1
      - 'DEFAULT_ORGANIZATION_NAME=${STUDIO_DEFAULT_ORGANIZATION:-Default Organization}'
      - 'DEFAULT_PROJECT_NAME=${STUDIO_DEFAULT_PROJECT:-Default Project}'
      - 'SUPABASE_URL=http://supabase-kong:8000'
      - 'SUPABASE_PUBLIC_URL=${SERVICE_URL_SUPABASEKONG}'
      - 'SUPABASE_ANON_KEY=${SERVICE_SUPABASEANON_KEY}'
      - 'SUPABASE_SERVICE_KEY=${SERVICE_SUPABASESERVICE_KEY}'
      - 'AUTH_JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - 'LOGFLARE_PUBLIC_ACCESS_TOKEN=${LOGFLARE_PUBLIC_ACCESS_TOKEN:-${SERVICE_PASSWORD_LOGFLARE}}'
      - 'LOGFLARE_PRIVATE_ACCESS_TOKEN=${LOGFLARE_PRIVATE_ACCESS_TOKEN:-${SERVICE_PASSWORD_LOGFLARE}}'
      - 'LOGFLARE_API_KEY=${SERVICE_PASSWORD_LOGFLARE}'
      - 'LOGFLARE_URL=http://supabase-analytics:4000'
      - 'SNIPPETS_MANAGEMENT_FOLDER=/app/snippets'
      - 'EDGE_FUNCTIONS_MANAGEMENT_FOLDER=/app/edge-functions'
      - 'SUPABASE_PUBLIC_API=${SERVICE_URL_SUPABASEKONG}'
      - 'NEXT_PUBLIC_SUPABASE_URL=${SERVICE_URL_SUPABASEKONG}'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${SERVICE_SUPABASEANON_KEY}'
      - NEXT_PUBLIC_ENABLE_LOGS=true
      - NEXT_ANALYTICS_BACKEND_PROVIDER=postgres
      - 'OPENAI_API_KEY=${OPENAI_API_KEY}'
      - IS_PLATFORM=true
      - NEXT_PUBLIC_IS_PLATFORM=true
      - NEXT_PUBLIC_AI_ASSISTANT_ENABLED=false
      - PORT=3000
    volumes:
      - './volumes/snippets:/app/snippets'
      - './volumes/functions:/app/edge-functions'
    networks:
      - coolify
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    extra_hosts:
      - "supabase.${PROJECT_DOMAIN:-localhost}:host-gateway"

  supabase-db:
    image: 'supabase/postgres:15.8.1.048'
    restart: unless-stopped
    ports:
      - '5432:5432'
    healthcheck:
      test:
        - CMD
        - pg_isready
        - '-U'
        - postgres
        - '-h'
        - 127.0.0.1
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s
    depends_on:
      supabase-vector:
        condition: service_healthy
    command:
      - postgres
      - '-c'
      - config_file=/etc/postgresql/postgresql.conf
      - '-c'
      - log_min_messages=fatal
    environment:
      - POSTGRES_HOST=/var/run/postgresql
      - 'PGPORT=${POSTGRES_PORT:-5432}'
      - 'POSTGRES_PORT=${POSTGRES_PORT:-5432}'
      - 'PGPASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - 'PGDATABASE=${POSTGRES_DB:-postgres}'
      - 'POSTGRES_DB=${POSTGRES_DB:-postgres}'
      - 'JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - 'JWT_EXP=${JWT_EXPIRY:-3600}'
    networks:
      - coolify
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - 'supabase-db-data:/var/lib/postgresql/data'
      - type: bind
        source: ./volumes/db/realtime.sql
        target: /docker-entrypoint-initdb.d/99-realtime.sql
      - type: bind
        source: ./volumes/db/_supabase.sql
        target: /docker-entrypoint-initdb.d/00-_supabase.sql
      - type: bind
        source: ./volumes/db/pooler.sql
        target: /docker-entrypoint-initdb.d/99-pooler.sql
      - type: bind
        source: ./volumes/db/webhooks.sql
        target: /docker-entrypoint-initdb.d/98-webhooks.sql
      - type: bind
        source: ./volumes/db/init.sh
        target: /docker-entrypoint-initdb.d/init.sh
      - type: bind
        source: ./volumes/db/jwt.sql
        target: /docker-entrypoint-initdb.d/99-jwt.sql
      - type: bind
        source: ./volumes/db/logs.sql
        target: /docker-entrypoint-initdb.d/99-logs.sql
      - 'supabase-db-config:/etc/postgresql-custom'

  supabase-analytics:
    image: 'supabase/logflare:1.31.2'
    restart: unless-stopped
    networks:
      - coolify
    healthcheck:
      test:
        - CMD
        - curl
        - 'http://127.0.0.1:4000/health'
      timeout: 10s
      interval: 15s
      retries: 30
      start_period: 120s
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    depends_on:
      supabase-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    environment:
      - LOGFLARE_NODE_HOST=0.0.0.0
      - LOGFLARE_HTTP_ADDR=0.0.0.0
      - LOGFLARE_HTTP_PORT=4000
      - PORT=4000
      - DB_USERNAME=supabase_admin
      - DB_DATABASE=_supabase
      - 'DB_HOSTNAME=${POSTGRES_HOSTNAME:-supabase-db}'
      - 'DB_PORT=${POSTGRES_PORT:-5432}'
      - 'DB_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - 'DB_URL=postgresql://supabase_admin:${SERVICE_PASSWORD_POSTGRES}@${POSTGRES_HOSTNAME:-supabase-db}:${POSTGRES_PORT:-5432}/_supabase'
      - DB_SCHEMA=_analytics
      - 'LOGFLARE_PUBLIC_ACCESS_TOKEN=${LOGFLARE_PUBLIC_ACCESS_TOKEN:-${SERVICE_PASSWORD_LOGFLARE}}'
      - 'LOGFLARE_PRIVATE_ACCESS_TOKEN=${LOGFLARE_PRIVATE_ACCESS_TOKEN:-${SERVICE_PASSWORD_LOGFLARE}}'
      - 'LOGFLARE_API_KEY=${SERVICE_PASSWORD_LOGFLARE}'
      - LOGFLARE_SINGLE_TENANT=true
      - LOGFLARE_SINGLE_TENANT_MODE=true
      - LOGFLARE_SUPABASE_MODE=true
      - LOGFLARE_MIN_CLUSTER_SIZE=1
      - 'POSTGRES_BACKEND_URL=postgresql://supabase_admin:${SERVICE_PASSWORD_POSTGRES}@${POSTGRES_HOSTNAME:-supabase-db}:${POSTGRES_PORT:-5432}/_supabase'
      - POSTGRES_BACKEND_SCHEMA=_analytics
      - LOGFLARE_FEATURE_FLAG_OVERRIDE=multibackend=true
      - LOGFLARE_REPLY_TO=admin@example.com

  supabase-vector:
    image: 'timberio/vector:0.28.1-alpine'
    networks:
      - coolify
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://supabase-vector:9001/health'
      timeout: 10s
      interval: 10s
      retries: 15
      start_period: 60s
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
    environment:
      - 'LOGFLARE_API_KEY=${SERVICE_PASSWORD_LOGFLARE}'
    configs:
      - source: vector_config
        target: /etc/vector/vector.yml
    command:
      - '--config'
      - etc/vector/vector.yml

  supabase-rest:
    image: 'postgrest/postgrest:v12.2.12'
    restart: unless-stopped
    networks:
      - coolify
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-analytics:
        condition: service_started
    environment:
      - 'PGRST_DB_URI=postgres://authenticator:${SERVICE_PASSWORD_POSTGRES}@${POSTGRES_HOSTNAME:-supabase-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}'
      - 'PGRST_DB_SCHEMAS=${PGRST_DB_SCHEMAS:-public,storage,graphql_public}'
      - PGRST_DB_ANON_ROLE=anon
      - 'PGRST_JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - PGRST_DB_USE_LEGACY_GUCS=false
      - 'PGRST_APP_SETTINGS_JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - 'PGRST_APP_SETTINGS_JWT_EXP=${JWT_EXPIRY:-3600}'
    command: postgrest

  supabase-auth:
    image: 'supabase/gotrue:v2.174.0'
    restart: unless-stopped
    networks:
      - coolify
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-analytics:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://127.0.0.1:9999/health'
      timeout: 10s
      interval: 10s
      retries: 15
      start_period: 60s
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    environment:
      - GOTRUE_API_HOST=0.0.0.0
      - GOTRUE_API_PORT=9999
      - 'API_EXTERNAL_URL=${API_EXTERNAL_URL:-http://supabase-kong:8000}'
      - GOTRUE_DB_DRIVER=postgres
      - 'GOTRUE_DB_DATABASE_URL=postgres://supabase_auth_admin:${SERVICE_PASSWORD_POSTGRES}@${POSTGRES_HOSTNAME:-supabase-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}'
      - 'GOTRUE_SITE_URL=${SERVICE_URL_SUPABASEKONG}'
      - 'GOTRUE_URI_ALLOW_LIST=${ADDITIONAL_REDIRECT_URLS}'
      - 'GOTRUE_DISABLE_SIGNUP=${DISABLE_SIGNUP:-false}'
      - GOTRUE_JWT_ADMIN_ROLES=service_role
      - GOTRUE_JWT_AUD=authenticated
      - GOTRUE_JWT_DEFAULT_GROUP_NAME=authenticated
      - 'GOTRUE_JWT_EXP=${JWT_EXPIRY:-3600}'
      - 'GOTRUE_JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - 'GOTRUE_EXTERNAL_EMAIL_ENABLED=${ENABLE_EMAIL_SIGNUP:-true}'
      - 'GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED=${ENABLE_ANONYMOUS_USERS:-false}'
      - 'GOTRUE_MAILER_AUTOCONFIRM=${ENABLE_EMAIL_AUTOCONFIRM:-false}'
      - 'GOTRUE_SMTP_ADMIN_EMAIL=${SMTP_ADMIN_EMAIL}'
      - 'GOTRUE_SMTP_HOST=${SMTP_HOST}'
      - 'GOTRUE_SMTP_PORT=${SMTP_PORT:-587}'
      - 'GOTRUE_SMTP_USER=${SMTP_USER}'
      - 'GOTRUE_SMTP_PASS=${SMTP_PASS}'
      - 'GOTRUE_SMTP_SENDER_NAME=${SMTP_SENDER_NAME}'
      - 'GOTRUE_MAILER_URLPATHS_INVITE=${MAILER_URLPATHS_INVITE:-/auth/v1/verify}'
      - 'GOTRUE_MAILER_URLPATHS_CONFIRMATION=${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}'
      - 'GOTRUE_MAILER_URLPATHS_RECOVERY=${MAILER_URLPATHS_RECOVERY:-/auth/v1/verify}'
      - 'GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE=${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}'
      - 'GOTRUE_MAILER_TEMPLATES_INVITE=${MAILER_TEMPLATES_INVITE}'
      - 'GOTRUE_MAILER_TEMPLATES_CONFIRMATION=${MAILER_TEMPLATES_CONFIRMATION}'
      - 'GOTRUE_MAILER_TEMPLATES_RECOVERY=${MAILER_TEMPLATES_RECOVERY}'
      - 'GOTRUE_MAILER_TEMPLATES_MAGIC_LINK=${MAILER_TEMPLATES_MAGIC_LINK}'
      - 'GOTRUE_MAILER_TEMPLATES_EMAIL_CHANGE=${MAILER_TEMPLATES_EMAIL_CHANGE}'
      - 'GOTRUE_MAILER_SUBJECTS_CONFIRMATION=${MAILER_SUBJECTS_CONFIRMATION}'
      - 'GOTRUE_MAILER_SUBJECTS_RECOVERY=${MAILER_SUBJECTS_RECOVERY}'
      - 'GOTRUE_MAILER_SUBJECTS_MAGIC_LINK=${MAILER_SUBJECTS_MAGIC_LINK}'
      - 'GOTRUE_MAILER_SUBJECTS_EMAIL_CHANGE=${MAILER_SUBJECTS_EMAIL_CHANGE}'
      - 'GOTRUE_MAILER_SUBJECTS_INVITE=${MAILER_SUBJECTS_INVITE}'
      - 'GOTRUE_EXTERNAL_PHONE_ENABLED=${ENABLE_PHONE_SIGNUP:-true}'
      - 'GOTRUE_SMS_AUTOCONFIRM=${ENABLE_PHONE_AUTOCONFIRM:-true}'
      - 'GOTRUE_EXTERNAL_GOOGLE_ENABLED=${GOTRUE_EXTERNAL_GOOGLE_ENABLED:-false}'
      - 'GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID=${GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID}'
      - 'GOTRUE_EXTERNAL_GOOGLE_SECRET=${GOTRUE_EXTERNAL_GOOGLE_SECRET}'

  realtime-dev:
    image: 'supabase/realtime:v2.34.47'
    restart: unless-stopped
    networks:
      - coolify
    container_name: realtime-dev.supabase-realtime
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-analytics:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - curl
        - '-sSfL'
        - '--head'
        - '-o'
        - /dev/null
        - '-H'
        - 'Authorization: Bearer ${SERVICE_SUPABASEANON_KEY}'
        - 'http://127.0.0.1:4000/api/tenants/realtime-dev/health'
      timeout: 10s
      interval: 10s
      retries: 15
      start_period: 60s
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    cap_add:
      - SYS_RESOURCE
    environment:
      - PORT=4000
      - 'DB_HOST=${POSTGRES_HOSTNAME:-supabase-db}'
      - 'DB_PORT=${POSTGRES_PORT:-5432}'
      - DB_USER=supabase_admin
      - 'DB_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - 'DB_NAME=${POSTGRES_DB:-postgres}'
      - 'DB_AFTER_CONNECT_QUERY=SET search_path TO _realtime'
      - DB_ENC_KEY=supabaserealtime
      - 'API_JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - FLY_ALLOC_ID=fly123
      - 'FLY_APP_NAME=realtime'
      - 'APP_NAME=realtime'
      - 'SECRET_KEY_BASE=${SECRET_PASSWORD_REALTIME}'
      - 'ERL_AFLAGS=-proto_dist inet_tcp'
      - ENABLE_TAILSCALE=false
      - "DNS_NODES=''"
      - RLIMIT_NOFILE=100000
      - SEED_SELF_HOST=true
      - LOG_LEVEL=error
      - RUN_JANITOR=true
      - JANITOR_INTERVAL=60000
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    command: "sh -c \"/app/bin/migrate && /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' && /app/bin/server\""

  supabase-minio:
    image: 'ghcr.io/coollabsio/minio:RELEASE.2025-10-15T17-29-55Z'
    restart: unless-stopped
    networks:
      - coolify
    environment:
      - 'MINIO_ROOT_USER=${SERVICE_USER_MINIO}'
      - 'MINIO_ROOT_PASSWORD=${SERVICE_PASSWORD_MINIO}'
    command: 'server --console-address ":9001" /data'
    healthcheck:
      test:
        - CMD
        - mc
        - ready
        - local
      interval: 5s
      timeout: 20s
      retries: 10
    volumes:
      - './volumes/storage:/data'

  minio-createbucket:
    image: minio/mc
    networks:
      - coolify
    restart: 'no'
    environment:
      - 'MINIO_ROOT_USER=${SERVICE_USER_MINIO}'
      - 'MINIO_ROOT_PASSWORD=${SERVICE_PASSWORD_MINIO}'
    depends_on:
      supabase-minio:
        condition: service_healthy
    entrypoint:
      - /entrypoint.sh
    volumes:
      - type: bind
        source: ./entrypoint.sh
        target: /entrypoint.sh

  supabase-storage:
    image: 'supabase/storage-api:v1.14.6'
    restart: unless-stopped
    networks:
      - coolify
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
      imgproxy:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - 'http://127.0.0.1:5000/status'
      timeout: 10s
      interval: 10s
      retries: 15
      start_period: 60s
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    environment:
      - SERVER_PORT=5000
      - SERVER_REGION=local
      - MULTI_TENANT=false
      - 'AUTH_JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - 'DATABASE_URL=postgres://supabase_storage_admin:${SERVICE_PASSWORD_POSTGRES}@${POSTGRES_HOSTNAME:-supabase-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}'
      - DB_INSTALL_ROLES=true
      - STORAGE_BACKEND=s3
      - STORAGE_S3_BUCKET=stub
      - 'STORAGE_S3_ENDPOINT=http://supabase-minio:9000'
      - STORAGE_S3_FORCE_PATH_STYLE=true
      - STORAGE_S3_REGION=us-east-1
      - 'AWS_ACCESS_KEY_ID=${SERVICE_USER_MINIO}'
      - 'AWS_SECRET_ACCESS_KEY=${SERVICE_PASSWORD_MINIO}'
      - UPLOAD_FILE_SIZE_LIMIT=524288000
      - UPLOAD_FILE_SIZE_LIMIT_STANDARD=524288000
      - UPLOAD_SIGNED_URL_EXPIRATION_TIME=120
      - TUS_URL_PATH=upload/resumable
      - TUS_MAX_SIZE=3600000
      - ENABLE_IMAGE_TRANSFORMATION=true
      - 'IMGPROXY_URL=http://imgproxy:8080'
      - IMGPROXY_REQUEST_TIMEOUT=15
      - DATABASE_SEARCH_PATH=storage
      - NODE_ENV=production
      - REQUEST_ALLOW_X_FORWARDED_PATH=true
    volumes:
      - './volumes/storage:/var/lib/storage'

  imgproxy:
    image: 'darthsim/imgproxy:v3.8.0'
    restart: unless-stopped
    networks:
      - coolify
    healthcheck:
      test:
        - CMD
        - imgproxy
        - health
      timeout: 10s
      interval: 10s
      retries: 15
      start_period: 60s
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    environment:
      - IMGPROXY_LOCAL_FILESYSTEM_ROOT=/
      - IMGPROXY_USE_ETAG=true
      - 'IMGPROXY_ENABLE_WEBP_DETECTION=${IMGPROXY_ENABLE_WEBP_DETECTION:-true}'
    volumes:
      - './volumes/storage:/var/lib/storage'

  supabase-meta:
    image: 'supabase/postgres-meta:v0.89.3'
    restart: unless-stopped
    networks:
      - coolify
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-analytics:
        condition: service_started
    environment:
      - PG_META_PORT=8080
      - 'PG_META_DB_HOST=${POSTGRES_HOSTNAME:-supabase-db}'
      - 'PG_META_DB_PORT=${POSTGRES_PORT:-5432}'
      - 'PG_META_DB_NAME=${POSTGRES_DB:-postgres}'
      - 'PG_META_DB_USER=supabase_admin'
      - 'PG_META_DB_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - 'PG_META_DB_SSLMODE=disable'
      - 'PG_META_CRYPTO_KEY=${PG_META_CRYPTO_KEY}'
    deploy:
      resources:
        limits:
          memory: 256M

  supabase-edge-functions:
    image: 'supabase/edge-runtime:v1.67.4'
    restart: unless-stopped
    networks:
      - coolify
    depends_on:
      supabase-analytics:
        condition: service_started
      supabase-edge-functions-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - echo
        - 'Edge Functions is healthy'
      timeout: 10s
      interval: 10s
      retries: 15
      start_period: 60s
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    environment:
      - 'JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - 'SUPABASE_URL=http://supabase-kong:8000'
      - 'SUPABASE_ANON_KEY=${SERVICE_SUPABASEANON_KEY}'
      - 'SUPABASE_SERVICE_ROLE_KEY=${SERVICE_SUPABASESERVICE_KEY}'
      - 'SUPABASE_DB_URL=postgresql://postgres:${SERVICE_PASSWORD_POSTGRES}@${POSTGRES_HOSTNAME:-supabase-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}'
      - 'VERIFY_JWT=${FUNCTIONS_VERIFY_JWT:-false}'
    volumes:
      - './volumes/functions:/home/deno/functions'
    command:
      - start
      - '--main-service'
      - /home/deno/functions/main

  supabase-supavisor:
    image: 'supabase/supavisor:2.5.1'
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - '-sSfL'
        - '-o'
        - /dev/null
        - 'http://127.0.0.1:4000/api/health'
      timeout: 10s
      interval: 10s
      retries: 15
      start_period: 60s
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    cap_add:
      - SYS_RESOURCE
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-analytics:
        condition: service_started
    environment:
      - POOLER_TENANT_ID=dev_tenant
      - POOLER_POOL_MODE=transaction
      - 'POOLER_DEFAULT_POOL_SIZE=${POOLER_DEFAULT_POOL_SIZE:-20}'
      - 'POOLER_MAX_CLIENT_CONN=${POOLER_MAX_CLIENT_CONN:-100}'
      - PORT=4000
      - 'POSTGRES_PORT=${POSTGRES_PORT:-5432}'
      - 'POSTGRES_HOSTNAME=${POSTGRES_HOSTNAME:-supabase-db}'
      - 'POSTGRES_DB=${POSTGRES_DB:-postgres}'
      - 'POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}'
      - 'DATABASE_URL=ecto://supabase_admin:${SERVICE_PASSWORD_POSTGRES}@${POSTGRES_HOSTNAME:-supabase-db}:${POSTGRES_PORT:-5432}/_supabase'
      - CLUSTER_POSTGRES=true
      - 'SECRET_KEY_BASE=${SERVICE_PASSWORD_SUPAVISORSECRET}'
      - 'VAULT_ENC_KEY=${SERVICE_PASSWORD_VAULTENC}'
      - 'API_JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - 'METRICS_JWT_SECRET=${SERVICE_PASSWORD_JWT}'
      - REGION=local
      - 'ERL_AFLAGS=-proto_dist inet_tcp'
    command:
      - /bin/sh
      - '-c'
      - '/app/bin/migrate && /app/bin/supavisor eval "$$(cat /etc/pooler/pooler.exs)" && /app/bin/server'
    volumes:
      - type: bind
        source: ./volumes/pooler/pooler.exs
        target: /etc/pooler/pooler.exs
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  supabase-db-data: null
  supabase-db-config: null

configs:
  vector_config:
    content: |
      api:
        enabled: true
        address: 0.0.0.0:9001
      sources:
        docker_host:
          type: docker_logs
          exclude_containers:
            - supabase-vector
      transforms:
        project_logs:
          type: remap
          inputs:
            - docker_host
          source: |-
            .project = "default"
            .event_message = del(.message)
            .appname = del(.container_name)
            del(.container_created_at)
            del(.container_id)
            del(.source_type)
            del(.stream)
            del(.label)
            del(.image)
            del(.host)
        router:
          type: route
          inputs:
            - project_logs
          route:
            kong: '.appname == "supabase-kong"'
            auth: '.appname == "supabase-auth"'
            rest: '.appname == "supabase-rest"'
            realtime: '.appname == "realtime-dev.supabase-realtime"'
            storage: '.appname == "supabase-storage"'
            functions: '.appname == "supabase-edge-functions"'
            db: '.appname == "supabase-db"'
        kong_logs:
          type: remap
          inputs:
            - router.kong
          source: |-
            req, err = parse_nginx_log(.event_message, "combined")
            if err == null {
                .timestamp = req.timestamp
                .metadata.request.headers.referer = req.referer
                .metadata.request.headers.user_agent = req.agent
                .metadata.request.headers.cf_connecting_ip = req.client
                .metadata.response.status_code = req.status
                url, split_err = split(req.request, " ")
                if split_err == null {
                    .metadata.request.method = url[0]
                    .metadata.request.path = url[1]
                    .metadata.request.protocol = url[2]
                }
            }
            if err != null {
              abort
            }
        kong_err:
          type: remap
          inputs:
            - router.kong
          source: |-
            .metadata.request.method = "GET"
            .metadata.response.status_code = 200
            parsed, err = parse_nginx_log(.event_message, "error")
            if err == null {
                .timestamp = parsed.timestamp
                .severity = parsed.severity
                .metadata.request.host = parsed.host
                .metadata.request.headers.cf_connecting_ip = parsed.client
                url, err = split(parsed.request, " ")
                if err == null {
                    .metadata.request.method = url[0]
                    .metadata.request.path = url[1]
                    .metadata.request.protocol = url[2]
                }
            }
            if err != null {
              abort
            }
        auth_logs:
          type: remap
          inputs:
            - router.auth
          source: |-
            parsed, err = parse_json(.event_message)
            if err == null {
                .metadata.timestamp = parsed.time
                .metadata = merge!(.metadata, parsed)
            }
        rest_logs:
          type: remap
          inputs:
            - router.rest
          source: |-
            parsed, err = parse_regex(.event_message, r'^(?P<time>.*): (?P<msg>.*)$')
            if err == null {
                .event_message = parsed.msg
                .timestamp = parse_timestamp!(value: parsed.time, format: "%d/%b/%Y:%H:%M:%S %z")
                .metadata.host = .project
            }
        realtime_logs_filtered:
          type: filter
          inputs:
            - router.realtime
          condition: '!contains(string!(.event_message), "/health")'
        realtime_logs:
          type: remap
          inputs:
            - realtime_logs_filtered
          source: |-
            .metadata.project = del(.project)
            .metadata.external_id = .metadata.project
            parsed, err = parse_regex(.event_message, r'^(?P<time>\d+:\d+:\d+\.\d+) \[(?P<level>\w+)\] (?P<msg>.*)$')
            if err == null {
                .event_message = parsed.msg
                .metadata.level = parsed.level
            }
        functions_logs:
          type: remap
          inputs:
            - router.functions
          source: |-
            .metadata.project_ref = del(.project)
        storage_logs:
          type: remap
          inputs:
            - router.storage
          source: |-
            .metadata.project = del(.project)
            .metadata.tenantId = .metadata.project
            parsed, err = parse_json(.event_message)
            if err == null {
                .event_message = parsed.msg
                .metadata.level = parsed.level
                .metadata.timestamp = parsed.time
                .metadata.context[0].host = parsed.hostname
                .metadata.context[0].pid = parsed.pid
            }
        db_logs:
          type: remap
          inputs:
            - router.db
          source: |-
            .metadata.host = "db-default"
            .metadata.parsed.timestamp = .timestamp
            parsed, err = parse_regex(.event_message, r'.*(?P<level>INFO|NOTICE|WARNING|ERROR|LOG|FATAL|PANIC?):.*', numeric_groups: true)
            if err != null || parsed == null {
              .metadata.parsed.error_severity = "info"
            }
            if parsed.level != null {
             .metadata.parsed.error_severity = parsed.level
            }
            if .metadata.parsed.error_severity == "info" {
                .metadata.parsed.error_severity = "log"
            }
            .metadata.parsed.error_severity = upcase!(.metadata.parsed.error_severity)
      sinks:
        logflare_auth:
          type: 'http'
          inputs:
            - auth_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 30
            retry_initial_backoff_secs: 1
            headers:
              x-api-key: ${SERVICE_PASSWORD_LOGFLARE}
          uri: 'http://supabase-analytics:4000/api/logs?source_name=gotrue.logs.prod'
        logflare_realtime:
          type: 'http'
          inputs:
            - realtime_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 30
            retry_initial_backoff_secs: 1
            headers:
              x-api-key: ${SERVICE_PASSWORD_LOGFLARE}
          uri: 'http://supabase-analytics:4000/api/logs?source_name=realtime.logs.prod'
        logflare_rest:
          type: 'http'
          inputs:
            - rest_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 30
            retry_initial_backoff_secs: 1
            headers:
              x-api-key: ${SERVICE_PASSWORD_LOGFLARE}
          uri: 'http://supabase-analytics:4000/api/logs?source_name=postgREST.logs.prod'
        logflare_db:
          type: 'http'
          inputs:
            - db_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 30
            retry_initial_backoff_secs: 1
            headers:
              x-api-key: ${SERVICE_PASSWORD_LOGFLARE}
          uri: 'http://supabase-analytics:4000/api/logs?source_name=postgres.logs'
        logflare_functions:
          type: 'http'
          inputs:
            - functions_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 30
            retry_initial_backoff_secs: 1
            headers:
              x-api-key: ${SERVICE_PASSWORD_LOGFLARE}
          uri: 'http://supabase-analytics:4000/api/logs?source_name=deno-relay-logs'
        logflare_storage:
          type: 'http'
          inputs:
            - storage_logs
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 30
            retry_initial_backoff_secs: 1
            headers:
              x-api-key: ${SERVICE_PASSWORD_LOGFLARE}
          uri: 'http://supabase-analytics:4000/api/logs?source_name=storage.logs.prod.2'
        logflare_kong:
          type: 'http'
          inputs:
            - kong_logs
            - kong_err
          encoding:
            codec: 'json'
          method: 'post'
          request:
            retry_max_duration_secs: 30
            retry_initial_backoff_secs: 1
            headers:
              x-api-key: ${SERVICE_PASSWORD_LOGFLARE}
          uri: 'http://supabase-analytics:4000/api/logs?source_name=cloudflare.logs.prod'
