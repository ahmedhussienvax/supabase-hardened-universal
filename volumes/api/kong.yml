_format_version: '"1.1"'

services:
  - name: auth
    url: http://supabase-auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1
        strip_path: true

  - name: rest
    url: http://supabase-rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1
        strip_path: true

  - name: storage
    url: http://supabase-storage:5000
    routes:
      - name: storage-route
        paths:
          - /storage/v1
        strip_path: true

  - name: realtime
    url: http://realtime-dev:4000
    routes:
      - name: realtime-websocket
        paths:
          - /realtime/v1
        strip_path: true

  - name: meta
    url: http://supabase-meta:8080
    routes:
      - name: meta-route
        paths:
          - /pg_meta
        strip_path: true

plugins:
  - name: cors
    config:
      origins: 
        - '*'
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Accept-Version
        - Content-Type
        - Api-Version
        - Range
        - Origination
        - Authorization
        - x-client-info
        - x-client-relay-protocol
        - x-supabase-auth
        - apikey
      exposed_headers:
        - Content-Range
        - X-Total-Count
        - Content-Type
      credentials: true
      max_age: 3600
